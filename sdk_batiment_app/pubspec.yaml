name: sdk_batiment_app
description: SDK BATIMENT - Étanchéité & Imperméabilisation Tunisie
publish_to: 'none'
version: 1.0.7+11

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  dio: ^5.4.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.0.0
  
  # Local Storage / Cache
  shared_preferences: ^2.2.0
  hive_flutter: ^1.1.0
  
  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  
  # PDF
  # Removed flutter_pdfview due to AGP 8.6 requirement
  
  # Maps & Location
  geolocator: ^10.0.0
  
  # Forms
  flutter_form_builder: ^9.0.0
  form_builder_validators: ^9.0.0
  
  # Image
  photo_view: ^0.14.0
  
  # Utils
  url_launcher: ^6.2.0
  intl: ^0.18.1
  timeago: ^3.3.0
  open_file_plus: ^3.4.1+1
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.0
  image_picker: ^1.0.7
  google_maps_flutter: ^2.5.3
  uuid: ^4.3.3

  # Icons
  cupertino_icons: ^1.0.6
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

