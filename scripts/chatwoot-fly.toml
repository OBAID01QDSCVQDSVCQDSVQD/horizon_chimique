app = "horizon-chatwoot"
primary_region = "fra"

[build]
  image = "chatwoot/chatwoot:v3.13.1"

[env]
  RAILS_ENV = "production"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
